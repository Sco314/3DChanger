<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3DChanger</title>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>

      <header id="toolbar">
        <span class="brand">3DChanger</span>
        <label class="btn">
          Import…
          <input type="file" id="file-input" multiple hidden
                 accept=".glb,.gltf,.obj,.mtl,.stl,.fbx,.3ds,.ply,.dae,.wrl,.3mf,image/*" />
        </label>
        <span class="sep"></span>
        <span class="group-label">Mode:</span>
        <button class="btn mode-btn" id="mode-object" title="Object (1)">Object</button>
        <button class="btn mode-btn" id="mode-face" title="Face (2)">Face</button>
        <button class="btn mode-btn" id="mode-edge" title="Edge (3)">Edge</button>
        <button class="btn mode-btn" id="mode-vertex" title="Vertex (4)">Vertex</button>
        <span class="sep"></span>
        <span class="group-label">Gizmo:</span>
        <button class="btn tool-btn" id="tool-select" title="Off (Q)">Off</button>
        <button class="btn tool-btn" id="tool-translate" title="Translate (W)">Move</button>
        <button class="btn tool-btn" id="tool-rotate" title="Rotate (E)">Rotate</button>
        <button class="btn tool-btn" id="tool-scale" title="Scale (R)">Scale</button>
        <span class="sep"></span>
        <button class="btn" id="op-isolate" title="Isolate (I) / exit (Esc)" disabled>Isolate</button>
        <button class="btn" id="op-duplicate" title="Duplicate (Shift+D)" disabled>Duplicate</button>
        <span class="sep"></span>
        <span class="group-label">Export:</span>
        <button class="btn" id="export-glb" disabled>GLB</button>
        <button class="btn" id="export-gltf" disabled>glTF (zip)</button>
        <button class="btn" id="export-obj" disabled>OBJ</button>
        <button class="btn" id="export-stl" disabled>STL</button>
      </header>

      <div id="component-actions" hidden>
        <span class="group-label">Component actions:</span>
        <button class="btn" id="ca-by-object" disabled title="Select all faces of the seed mesh">By Object</button>
        <button class="btn" id="ca-by-material" disabled title="Select faces sharing the seed material across the scene">By Material</button>
        <button class="btn" id="ca-connected" disabled title="Flood-fill faces from the seed via shared edges">Connected</button>
        <button class="btn" id="ca-by-angle" disabled title="Flood-fill stopping at hard edges (dihedral &gt; threshold)">By Angle</button>
        <label class="inline">
          Angle (°):
          <input type="number" id="ca-angle-deg" min="0" max="180" step="1" value="30" />
        </label>
        <button class="btn" id="ca-clear" disabled title="Clear component selection">Clear</button>
      </div>

      <div id="edit-actions">
        <span class="group-label">Edit:</span>
        <button class="btn" id="ed-delete" disabled title="Delete selected faces (Del)">Delete Faces</button>
        <button class="btn" id="ed-keep" disabled title="Keep selected faces, delete the rest on those meshes">Keep Faces</button>
        <button class="btn" id="ed-separate" disabled title="Move selected faces into a new sibling Mesh">Separate</button>
        <span class="sep"></span>
        <button class="btn" id="ed-detach-mat" disabled title="Split selected meshes by material slot">Detach by Material</button>
        <button class="btn" id="ed-detach-comp" disabled title="Split selected meshes by connected component">Detach by Component</button>
        <span class="sep"></span>
        <button class="btn" id="ed-fill-holes" disabled title="Fill open boundary loops on selected meshes (centroid fan)">Fill Holes</button>
        <button class="btn" id="ed-recompute-normals" disabled title="Run computeVertexNormals() on selected meshes">Recompute Normals</button>
      </div>

      <aside id="scene-panel">
        <h3>Scene</h3>
        <div id="scene-tree"><em class="empty">No model loaded.</em></div>
      </aside>

      <aside id="diagnostics">
        <h3>Diagnostics</h3>
        <div id="diagnostics-body"><em>No model loaded.</em></div>
      </aside>

      <aside id="material-panel">
        <h3>Material</h3>
        <div id="material-body"><em class="empty">No mesh selected.</em></div>
      </aside>

      <div id="dropzone-hint">Drop files here, or use Import…</div>
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
