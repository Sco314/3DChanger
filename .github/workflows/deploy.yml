name: Build and publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git rev-parse --short HEAD` returns a real
          # SHA in the build pill instead of "dev".
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Add a .nojekyll so GitHub Pages serves files starting with `_` and
      # doesn't run the markdown through Jekyll.
      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Publish to gh-pages branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          cd dist
          git init -q -b gh-pages
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          # Force-push: gh-pages is a deploy branch, history doesn't need to
          # be preserved.
          git push -f -q origin gh-pages
